<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Status - Quran Web</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script th:src="@{/js/search.js}" defer></script>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-inner">
            <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links">
                <a th:href="@{/}">Home</a>
                <a th:href="@{/quran/surahs}">Quran</a>
                <a th:href="@{/translations/languages}">Languages</a>
                <a th:href="@{/health}">Health</a>
            </div>
            <div class="nav-search">
                <input type="text" class="nav-search-input" placeholder="Surah or 2:255…" autocomplete="off">
            </div>
        </div>
    </nav>
    <header>
        <div class="container">
            <h1>System Health</h1>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="status-box">
                <p>Status: <span th:text="${health.status}" th:class="${health.status == 'UP' ? 'status-up' : 'status-down'}">UP</span></p>
                <p>Timestamp: <span th:text="${health.timestamp}">2026-01-19 12:30:00</span></p>
            </div>
        </div>
    </main>
</body>
</html>
