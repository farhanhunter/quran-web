<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Page ' + ${page} + ' - Quran Web'">Page 1 - Quran Web</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script th:src="@{/js/search.js}" defer></script>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-inner">
            <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links">
                <a th:href="@{/}">Home</a>
                <a th:href="@{/quran/surahs}">Quran</a>
                <a th:href="@{/translations/languages}">Languages</a>
                <a th:href="@{/health}">Health</a>
                <a th:href="@{/quran/sajda}">Sajda</a>
            </div>
            <div class="nav-search">
                <input type="text" class="nav-search-input" placeholder="Surah or 2:255…" autocomplete="off">
            </div>
        </div>
    </nav>

    <header>
        <div class="container">
            <a th:href="@{/quran/surahs}" class="back-link">← Surah List</a>
            <h1 th:text="'Mushaf Page ' + ${page}">Page 1</h1>
            <p style="margin:0.25rem 0 0; opacity:0.85; font-size:0.95rem;">
                <span th:text="${ayahs.size()}">0</span> ayahs &bull; of 604 pages
            </p>
            <div class="browse-nav">
                <a th:if="${prevPage != null}" th:href="@{'/quran/page/' + ${prevPage}}"
                   class="browse-nav__btn">← <span th:text="${prevPage}"></span></a>
                <span th:if="${prevPage == null}" class="browse-nav__btn browse-nav__btn--disabled">← Prev</span>

                <form class="browse-nav__jump"
                      onsubmit="window.location.href='/quran/page/'+this.pageInput.value; return false;">
                    <input name="pageInput" type="number" min="1" max="604"
                           th:value="${page}" class="browse-nav__input" aria-label="Jump to page">
                    <button type="submit" class="browse-nav__go">Go</button>
                </form>

                <a th:if="${nextPage != null}" th:href="@{'/quran/page/' + ${nextPage}}"
                   class="browse-nav__btn"><span th:text="${nextPage}"></span> →</a>
                <span th:if="${nextPage == null}" class="browse-nav__btn browse-nav__btn--disabled">Next →</span>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="browse-list">
                <div th:each="section : ${sections}" class="browse-section">
                    <div class="browse-surah-header">
                        <a th:href="@{'/quran/surah/' + ${section.surahNumber}}"
                           th:text="${section.surahNumber + '. ' + section.surahName}">1. Al-Fatihah</a>
                    </div>
                    <div th:each="ayah : ${section.ayahs}" class="browse-ayah">
                        <span class="browse-ayah__ref"
                              th:text="${ayah.surahNumber + ':' + ayah.ayahNumber}">1:1</span>
                        <p class="arabic browse-ayah__text" th:text="${ayah.textArabic}"></p>
                        <a th:href="@{'/quran/surah/' + ${ayah.surahNumber} + '#ayah-' + ${ayah.ayahNumber}}"
                           class="browse-ayah__link" title="Go to ayah">→</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
