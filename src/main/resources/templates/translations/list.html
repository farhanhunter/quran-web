<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translations - Quran Web</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-inner">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/quran/surahs}">Quran</a>
            <a th:href="@{/translations/languages}">Languages</a>
            <a th:href="@{/health}">Health</a>
        </div>
    </nav>
    <header>
        <div class="container">
            <h1>Translations</h1>
        </div>
    </header>
    <main>
        <div class="container">
            <h2>Available Translation Languages</h2>
            <ul>
                <li th:each="lang : ${languages}">
                    <span th:text="${lang.name}">Indonesian</span> (<span th:text="${lang.code}">id</span>) - <span th:text="${lang.nativeName}">Bahasa Indonesia</span>
                </li>
            </ul>
        </div>
    </main>
</body>
</html>
